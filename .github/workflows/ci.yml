name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: ['17']
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Verify
        # 以 starter/pom.xml 为根构建（仅发布物）。不能用 -pl starter（仍会读父 reactor 的 test/pom.xml，
        # 其本地 DM jar 绝对路径 D:/... 在 Linux 连 POM 都读不了）；-f starter/pom.xml 只继承父 pom、不遍历 <modules>。
        run: mvn -B -ntp -f starter/pom.xml verify -Dgpg.skip=true
