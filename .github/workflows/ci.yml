name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: ['17']
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Verify
        # 仅验证 starter（发布物）。test 模块是本地集成范本，依赖本地 DM jar 的绝对路径(D:/...)与本地数据库，
        # 在 CI/Linux 无法构建/运行（连 POM 都读不了）；故 CI 只构建并测试 starter。
        run: mvn -B -ntp -pl starter -am verify -Dgpg.skip=true
